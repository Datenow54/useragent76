<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 REALISTIC UA GENERATOR</title>

<style>
body {
  background:#0b0b0b;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}
button,select {
  padding:10px;
  margin:10px;
}
textarea {
  width:95%;
  height:180px;
  background:#111;
  color:#0f0;
  padding:10px;
}
</style>
</head>

<body>

<h2>🚀 Realistic User-Agent Generator</h2>

<select id="device">
  <option value="android">Android</option>
  <option value="ios">iPhone</option>
</select>

<select id="app">
  <option value="chrome">Chrome</option>
  <option value="facebook">Facebook</option>
  <option value="instagram">Instagram</option>
</select>

<br>
<button onclick="gen()">Generate</button>

<textarea id="out"></textarea>

<script>

// ===== REAL DEVICE POOL =====
const androidDevices = [
  "SM-G991B", // Samsung S21
  "SM-A525F",
  "Pixel 6",
  "Pixel 7",
  "M2007J20CG" // Xiaomi
];

const iosDevices = [
  "iPhone13,3",
  "iPhone14,2",
  "iPhone15,3"
];

// ===== REAL VERSION SET =====
const chromeVersions = [
  "133.0.6943.126",
  "134.0.6998.88",
  "135.0.7049.100",
  "136.0.7103.92",
  "137.0.7151.68",
  "138.0.7204.157",
  "139.0.7258.66",
  "140.0.7300.0",
  "141.0.7350.0",
  "142.0.7400.0",
  "143.0.7450.0",
  "144.0.7500.0",
  "145.0.7550.0",
  "146.0.7600.0"
];

// ===== UTILS =====
function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

// ===== GENERATOR =====
function gen(){

let deviceType = document.getElementById("device").value;
let app = document.getElementById("app").value;

let chrome = pick(chromeVersions);
let ua = "";

// ANDROID
if(deviceType === "android"){
  let model = pick(androidDevices);
  let androidVer = Math.floor(Math.random()*5)+10; // 10-14

  ua = `Mozilla/5.0 (Linux; Android ${androidVer}; ${model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chrome} Mobile Safari/537.36`;

  if(app === "facebook"){
    ua += ` [FBAN/FB4A;FBAV/${Math.floor(Math.random()*100)+400}.0.0.0;FBBV/${Math.floor(Math.random()*900000000)};]`;
  }

  if(app === "instagram"){
    ua = `Instagram ${Math.floor(Math.random()*100)+300}.0.0.0 Android (${androidVer}/${androidVer}; 420dpi; 1080x2400; samsung; ${model}; en_US;)`;
  }
}

// IOS
if(deviceType === "ios"){
  let model = pick(iosDevices);
  let iosVer = Math.floor(Math.random()*4)+14;

  ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${iosVer}_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${iosVer}.0 Mobile/15E148 Safari/604.1`;

  if(app === "facebook"){
    ua += ` [FBAN/FBIOS;FBAV/${Math.floor(Math.random()*100)+400}.0.0.0;FBDV/${model};]`;
  }

  if(app === "instagram"){
    ua = `Instagram ${Math.floor(Math.random()*100)+300}.0.0.0 iOS (${iosVer}.0; ${model}; en_US;)`;
  }
}

document.getElementById("out").value = ua;
}

</script>

</body>
</html>
